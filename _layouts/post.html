---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="meta">{{ page.date | date: "%B %d, %Y" }}{% if page.categories %} · {{ page.categories | join: ", " }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <p class="back-link"><a href="{{ '/mini-blog/' | relative_url }}">← Back to Mini-Blog</a></p>
</article>
